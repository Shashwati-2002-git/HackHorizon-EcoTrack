<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoTrack Dashboard</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Main CSS -->
<link rel="stylesheet" href="../css/style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Dashboard JS -->
<script type="module" src="../js/dashboard.js"></script>

<style>

/* 🌌 Container */
.dashboard-container {
    display: flex;
    min-height: 100vh;
}

/* 🌿 Sidebar (Glass Dark Theme) */
.dashboard-sidebar {
    width: 220px;
    padding: 20px;

    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);

    box-shadow: var(--shadow-soft);

    display: flex;
    flex-direction: column;
    gap: 15px;

    border-right: 1px solid rgba(255,255,255,0.1);
}

.dashboard-sidebar h3 {
    margin-bottom: 10px;
    color: var(--text-main);
}

/* Sidebar Buttons */
.dashboard-sidebar button {
    padding: 12px;
    border-radius: 10px;

    background: rgba(255,255,255,0.05);
    color: var(--text-main);

    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;

    transition: 0.3s;
}

.dashboard-sidebar button:hover {
    background: var(--primary-green);
    color: white;
    box-shadow: var(--glow);
}

.dashboard-sidebar button.active {
    background: var(--primary-green);
    color: white;
    box-shadow: var(--glow);
}

/* 📊 Main Area */
.dashboard-main {
    flex: 1;
    padding: 2.5rem;
}

.dashboard-main h2 {
    margin-bottom: 20px;
}

/* 📦 Chart Card (Glass Style) */
.chart-card {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);

    padding: 25px;
    border-radius: 15px;

    border: 1px solid rgba(255,255,255,0.1);

    box-shadow: var(--shadow-soft);

    max-width: 900px;
}

/* Chart canvas */
canvas {
    width: 100% !important;
}

/* 📱 Responsive */
@media (max-width: 768px) {
    .dashboard-container {
        flex-direction: column;
    }

    .dashboard-sidebar {
        flex-direction: row;
        overflow-x: auto;
        width: 100%;
    }
}

</style>

</head>

<body>

<!-- ✅ NAVBAR -->
<header class="navbar">
    <div class="logo">
        <span class="icon">🌿</span> <strong>EcoTrack</strong>
    </div>
    <nav>
        <ul class="nav-links">
            <li><a href="/input">Input</a></li>
            <li><a href="/community">My Communities</a></li>
            <li><a href="/" class="btn-secondary">Home</a></li>
        </ul>
    </nav>
</header>

<!-- ✅ DASHBOARD -->
<div class="dashboard-container">

    <!-- Sidebar -->
    <div class="dashboard-sidebar">
        <h3>📊 My Analytics</h3>
        <button onclick="setActive(this); loadData('day')">Past 24 Hours</button>
        <button onclick="setActive(this); loadData('week')">Weekly</button>
        <button onclick="setActive(this); loadData('month')">Monthly</button>
        <button onclick="setActive(this); loadData('year')">Yearly</button>
        <button onclick="goToHistory()">History</button>
    </div>

    <!-- Main Content -->
    <div class="dashboard-main">
        <h2>Carbon Footprint Dashboard</h2>

        <div class="chart-card">
            <canvas id="chart"></canvas>
        </div>
    </div>

</div>

<footer>
    <div class="footer-content">
        <p>&copy; 2024 EcoTrack Assistant. Together for a greener planet 🌍</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a> &nbsp; &nbsp;
            <a href="#">Contact</a>
        </div>
    </div>
</footer>

<script>
function setActive(btn) {
    document.querySelectorAll(".dashboard-sidebar button").forEach(b => {
        b.classList.remove("active");
    });
    btn.classList.add("active");
}

window.onload = () => {
    const firstBtn = document.querySelector(".dashboard-sidebar button");
    firstBtn.classList.add("active");
    loadData("day");
};

function goToHistory() {
    window.location.assign("/history");
}

</script>

</body>
</html>
