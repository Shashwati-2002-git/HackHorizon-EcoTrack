<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoTrack</title>

    <link rel="stylesheet" href="../css/style.css">

    <!-- Firebase -->
    <script type="module" src="../js/firebase.js"></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back 🌿</h2>
        <p>Login to continue your journey</p>

        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Enter Email" required>
            <input type="password" id="loginPassword" placeholder="Enter Password" required>

            <button type="submit" class="btn-primary-large">Login</button>
        </form>

        <p class="auth-footer">
            Don't have an account? <a href="createAccount.html">Sign up</a>
        </p>

        <p id="loginMessage"></p>
    </div>
</div>

</body>
</html>
