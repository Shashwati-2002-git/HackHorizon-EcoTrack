<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | EcoTrack</title>

    <link rel="stylesheet" href="../css/style.css">

    <!-- Firebase SDK -->
    <script type="module" src="../js/firebase.js"></script>
</head>
<body>

<!-- ✅ NAVBAR (same as index.html) -->
<header class="navbar">
    <div class="logo">
        <span class="icon">🌿</span> <strong>EcoTrack</strong>
    </div>
    <nav>
        <ul class="nav-links">
            <li><a href="/" class="btn-secondary">Home</a></li>
        </ul>
    </nav>
</header>

<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account 🌿</h2>
        <p>Start your sustainability journey</p>

        <form id="signupForm">
            <input type="email" id="email" placeholder="Enter Email" required>
            <input type="password" id="password" placeholder="Enter Password" required>

            <button type="submit" class="btn-primary-large">Create Account</button>
        </form>

        <p class="auth-footer">
            <br>
            Already have an account? <a href="/login">Login</a><br><br>
            <a href="/forgot-password">Forgot Password?</a>
        </p>

        <p id="message"></p>
    </div>
</div>

<footer>
    <div class="footer-content">
        <p>&copy; 2024 EcoTrack Assistant. Together for a greener planet 🌍</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a> &nbsp; &nbsp;
            <a href="#">Contact</a>
        </div>
    </div>
</footer>

</body>
</html>
