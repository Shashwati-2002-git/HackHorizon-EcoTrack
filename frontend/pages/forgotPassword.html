<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EcoTrack</title>

    <link rel="stylesheet" href="../css/style.css">

    <!-- Firebase -->
    <script type="module" src="../js/firebase.js"></script>
</head>
<body>

<!-- ✅ NAVBAR -->
<header class="navbar">
    <div class="logo">
        <span class="icon">🌿</span> <strong>EcoTrack</strong>
    </div>
    <nav>
        <ul class="nav-links">
            <li><a href="/" class="btn-secondary">Home</a></li>
        </ul>
    </nav>
</header>

<!-- 🔐 FORGOT PASSWORD -->
<div class="auth-container">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <p>Enter your email to receive a reset link</p>

        <form id="forgotForm">
            <input type="email" id="resetEmail" placeholder="Enter your email" required>

            <button type="submit" class="btn-primary-large">
                Send Reset Link
            </button>
        </form>

        <p class="auth-footer">
            <br>
            Remember your password? <a href="/login">Login</a><br><br>
            Don't have an account? <a href="/create-account">Sign up</a>
        </p>

        <p id="resetMessage"></p>
    </div>
</div>

<!-- ✅ FOOTER -->
<footer>
    <div class="footer-content">
        <p>&copy; 2024 EcoTrack Assistant. Together for a greener planet 🌍</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a> &nbsp; &nbsp;
            <a href="#">Contact</a>
        </div>
    </div>
</footer>

<!-- 🔥 OPTIONAL JS (for Firebase reset) -->
<script type="module">
import { auth, sendPasswordResetEmail } from "../js/firebase.js";

const form = document.getElementById("forgotForm");
const message = document.getElementById("resetMessage");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("resetEmail").value;

    try {
        await sendPasswordResetEmail(auth, email);
        message.innerText = "✅ Reset link sent! Check your email.";
        message.style.color = "lightgreen";
    } catch (err) {
        message.innerText = "❌ " + err.message;
        message.style.color = "red";
    }
});
</script>

</body>
</html>
