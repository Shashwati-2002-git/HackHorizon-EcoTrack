<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoTrack Input</title>

<link rel="stylesheet" href="../css/style.css">
<script defer src="../js/input.js"></script>
</head>

<body>

<!-- ✅ NAVBAR (same as index.html) -->
<header class="navbar">
    <div class="logo">
        <span class="icon">🌿</span> <strong>EcoTrack</strong>
    </div>
    <nav>
        <ul class="nav-links">
            <li><a href="/dashboard" class="btn-primary">Dashboard</a></li>
            <li><a href="/community">Join A Community</a></li>
            <li><a href="/" class="btn-secondary">Home</a></li>
        </ul>
    </nav>
</header>

<div class="input-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <button type="button" onclick="loadForm('current', this)">Current</button>
        <button type="button" onclick="loadForm('day', this)">24 Hours</button>
        <button type="button" onclick="loadForm('week', this)">Week</button>
        <button type="button" onclick="loadForm('month', this)">Month</button>
        <button type="button" onclick="loadForm('year', this)">Year</button>
    </div>

    <!-- FORM -->
    <div class="form-area">
        <h2 id="formTitle">Enter Your Data</h2>

        <form id="carbonForm">

            <!-- FOOD -->
            <div class="form-group">
                <label>Food</label>
                <input type="text" id="food" placeholder="e.g., Rice, Chicken, Fast Food">

                <label>No. of times consumed</label>
                <input type="number" id="foodCount" placeholder="e.g., 3">
            </div>

            <!-- TRANSPORT -->
            <div class="form-group">
                <label>Transport Mode</label>
                <input type="text" id="transport" placeholder="e.g., Car, Bus, Bike, Train">

                <label>Vehicle Type</label>
                <input type="text" id="vehicleType" placeholder="e.g., Petrol, Diesel, Electric">

                <label>Kilometers Travelled</label>
                <input type="number" id="kmTravelled" placeholder="e.g., 15">

                <label>No. of Days Travelled</label>
                <input type="number" id="travelDays" placeholder="e.g., 5">
            </div>

            <!-- SHOPPING -->
            <div class="form-group">
                <label>Clothes Bought</label>
                <input type="text" id="shopping" placeholder="e.g., T-shirts, Jeans, Jackets">

                <label>Clothing Material</label>
                <input type="text" id="clothMaterial" placeholder="e.g., Cotton, Polyester, Wool">

                <label>No. of Clothes</label>
                <input type="number" id="clothCount" placeholder="e.g., 2">
            </div>

            <!-- APPLIANCES -->
            <div class="form-group">
                <label>Appliances Used</label>
                <input type="text" id="appliances" placeholder="e.g., AC, Fan, Refrigerator">

                <label>Usage Duration (hours)</label>
                <input type="number" id="usageTime" placeholder="e.g., 6">
            </div>

            <button type="submit" class="submit-btn">
                Calculate Carbon Footprint
            </button>

        </form>
    </div>

</div>

<footer>
    <div class="footer-content">
        <p>&copy; 2024 EcoTrack Assistant. Together for a greener planet 🌍</p>
        <div class="footer-links">
            <a href="#">Privacy Policy</a> &nbsp; &nbsp;
            <a href="#">Contact</a>
        </div>
    </div>
</footer>

</body>
</html>
