<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoTrack Input</title>

<link rel="stylesheet" href="../css/style.css">
<script defer src="../js/input.js"></script>
</head>

<body>

<div class="input-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <button type="button" onclick="loadForm('current', this)">Current</button>
        <button type="button" onclick="loadForm('day', this)">24 Hours</button>
        <button type="button" onclick="loadForm('week', this)">Week</button>
        <button type="button" onclick="loadForm('month', this)">Month</button>
        <button type="button" onclick="loadForm('year', this)">Year</button>
    </div>

    <!-- FORM -->
    <div class="form-area">
        <h2 id="formTitle">Enter Your Data</h2>

        <form id="carbonForm">

            <!-- FOOD -->
            <div class="form-group">
                <label>Food Type</label>
                <input type="text" id="food">

                <label>No. of times consumed</label>
                <input type="number" id="foodCount">
            </div>

            <!-- TRANSPORT -->
            <div class="form-group">
                <label>Transport Mode</label>
                <input type="text" id="transport">

                <label>Vehicle Type</label>
                <input type="text" id="vehicleType">

                <label>Kilometers Travelled</label>
                <input type="number" id="kmTravelled">

                <label>No. of Days Travelled</label>
                <input type="number" id="travelDays">
            </div>

            <!-- SHOPPING -->
            <div class="form-group">
                <label>Clothing Type</label>
                <input type="text" id="shopping">

                <label>Clothing Material</label>
                <input type="text" id="clothMaterial">

                <label>No. of Clothes</label>
                <input type="number" id="clothCount">
            </div>

            <!-- APPLIANCES -->
            <div class="form-group">
                <label>Appliances Used</label>
                <input type="text" id="appliances">

                <label>Usage Duration (hours)</label>
                <input type="number" id="usageTime">
            </div>

            <button type="submit" class="submit-btn">
                Calculate Carbon Footprint
            </button>

        </form>
    </div>

</div>

</body>
</html>
