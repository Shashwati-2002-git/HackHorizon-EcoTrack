<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack Input</title>

    <link rel="stylesheet" href="../css/style.css">
    <script defer src="../js/input.js"></script>
</head>

<body>

<div class="input-container">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <button type="button" onclick="loadForm('current', this)">Current</button>
        <button type="button" onclick="loadForm('day', this)">24 Hours</button>
        <button type="button" onclick="loadForm('week', this)">Week</button>
        <button type="button" onclick="loadForm('month', this)">Month</button>
        <button type="button" onclick="loadForm('year', this)">Year</button>
    </div>

    <!-- FORM AREA -->
    <div class="form-area">
        <h2 id="formTitle">Enter Your Data</h2>

        <form id="carbonForm">

            <!-- FOOD -->
            <div class="form-group">
                <label>Food Type</label>
                <input type="text" id="food" placeholder="e.g., veg, chicken, processed">

                <label>No. of times consumed</label>
                <input type="number" id="foodCount" placeholder="e.g., 3">
            </div>

            <!-- TRANSPORT -->
            <div class="form-group">
                <label>Transport Mode</label>
                <input type="text" id="transport" placeholder="e.g., car, bus, bike">

                <label>Vehicle Type</label>
                <input type="text" id="vehicleType" placeholder="petrol, diesel, electric">

                <label>Kilometers Travelled</label>
                <input type="number" id="kmTravelled" placeholder="e.g., 20">

                <label>No. of Days Travelled</label>
                <input type="number" id="travelDays" placeholder="e.g., 5">
            </div>

            <!-- SHOPPING -->
            <div class="form-group">
                <label>Clothing Type</label>
                <input type="text" id="shopping" placeholder="e.g., jeans, shirts">

                <label>Clothing Material</label>
                <input type="text" id="clothMaterial" placeholder="cotton, polyester">

                <label>No. of Clothes</label>
                <input type="number" id="clothCount" placeholder="e.g., 2">
            </div>

            <!-- APPLIANCES -->
            <div class="form-group">
                <label>Appliances Used</label>
                <input type="text" id="appliances" placeholder="AC, fridge">

                <label>Usage Duration (hours)</label>
                <input type="number" id="usageTime" placeholder="e.g., 5">
            </div>

            <button type="submit" class="submit-btn">
                Calculate Carbon Footprint
            </button>

        </form>
    </div>

</div>

</body>
</html>
